name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Validate clean public boundary
        run: python3 scripts/check_public_boundary.py --strict-tree

      - name: Validate repository documentation
        run: python3 scripts/check_repository_docs.py

      - name: Validate version metadata
        run: python3 scripts/version_control.py check

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check and build frontend
        run: npm run check

      - name: Compile Python source
        run: python3 -m compileall -q minem scripts server.py

      - name: Run isolated regression tests
        run: |
          python3 scripts/test_html_dependencies.py
          python3 scripts/test_import_pipeline.py
          python3 scripts/test_report_canvas_normalization.py

      - name: Run empty-library API smoke test
        shell: bash
        run: |
          set -euo pipefail
          export MINEM_DATA_DIR="$RUNNER_TEMP/minem-runtime"
          export AUTO_IMPORT_ON_START=0
          export MINEM_AGENT_INTERNAL_API=0
          python3 server.py >"$RUNNER_TEMP/minem-server.log" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for attempt in {1..40}; do
            if curl --fail --silent http://127.0.0.1:8790/api/version >/dev/null; then
              break
            fi
            if ! kill -0 "$server_pid" 2>/dev/null; then
              cat "$RUNNER_TEMP/minem-server.log"
              exit 1
            fi
            sleep 0.25
          done
          curl --fail --silent http://127.0.0.1:8790/api/version >/dev/null
          python3 scripts/check_api_contract.py --base-url http://127.0.0.1:8790

  docker:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 25
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build public Docker image
        run: docker build --build-arg MINEM_VERSION=0.4.0 -t minem:ci .
